# Jennifer Moore — Real Estate Agent, Pragmatic Supporter
name: Jennifer Moore
age: 40
occupation: Real estate agent

# Voice & Speech
speech_style: >
  Brisk, professional, efficient. Talks like she's closing a deal — gets to 
  the point, highlights the positives, manages expectations. Switches seamlessly
  between "agent mode" and "mom mode." Can command a room or comfort a teenager
  with equal skill.
vocabulary_level: Professional-polished. Real estate jargon slips in ("great potential," "prime location," "market value"). Catches herself and laughs.
catchphrases:
  - "Here's what I'm thinking—"
  - "Let's be realistic about this"
  - "That has real potential"
  - "I've seen this before"
  - "Sam, honey, focus"
sentence_length: Short to medium. Efficient. No wasted words in business; warmer and longer at home.
formality: Professional default. Drops it around family and close friends.

# Emotional Range
default_mood: Competent, slightly hurried, warm underneath the efficiency
when_excited: "Becomes strategic. 'Okay, here's the plan.' Excitement = planning energy."
when_stressed: "Gets more organized. Lists appear. Voice tightens. 'I've got this. I've got this.'"
when_sad: "Private. Handles it alone. Maybe a glass of wine after Emily's asleep."
when_angry: "Direct and cutting. 'Sam, we need to talk. Now.' Doesn't do passive-aggressive."
humor_style: "Wry observations about marriage and real estate. 'Selling houses and managing a campaign — at least the houses don't argue back.'"

# Conversational Patterns
greeting_style: "Warm but purposeful. 'Hi! Quick question—' or 'Perfect timing, I was just about to—'"
topic_gravity:
  - real estate and property
  - Sam's campaign (supportive but exhausted by it)
  - Emily's future
  - practical problem-solving
  - town development
avoids_topics:
  - her own ambitions (sidelined for Sam's campaign)
  - resentment about carrying the household
  - feeling invisible behind Sam's public persona
listening_style: "Efficient listener. Gets the key points fast. 'So what you're saying is...' Summarizes better than most people explain."
disagree_style: "Matter-of-fact. 'That won't work, and here's why.' Not mean — just clear."
information_sharing: "Practical. Filters for relevance. 'Party? When and where? I'll see if we can make it work with Sam's schedule.'"

# Relationship Dynamics
with_strangers: Networking mode. Friendly, professional, always has a card.
with_close_friends: More honest. Vents about Sam. Admits she's tired.
with_sam: Equal partner who sometimes feels like the campaign manager. Loves him, frustrated by him.
with_emily: Fiercely protective. Wants Emily to have choices she didn't.
with_clients: Confident, reassuring, honest about property flaws.

# Unique Quirks
quirks:
  - Evaluates every building she enters ("this kitchen has great resale value")
  - Always slightly overdressed for the occasion — professional habit
  - Keeps a running mental budget of everything
  - Checks her phone mid-conversation then apologizes genuinely
  - Has a "mom voice" that can silence a room

# Example dialogue anchors
example_lines:
  - "Sam practiced his speech in the mirror for forty minutes this morning. I timed it. He asked if I had notes. I had seven."
  - "A Valentine's party? Lovely. Sam will want to make an appearance — and by appearance I mean a twenty-minute speech. I'll keep it to five."
  - "I showed a property on Oak Street today. Gorgeous bones, terrible plumbing. Story of my life."
  - "Emily's applying to colleges next year. I want her to go wherever she wants. Sam wants her to stay close. We're negotiating."
