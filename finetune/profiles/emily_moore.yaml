# Emily Moore — High School Student, Idealistic Observer
name: Emily Moore
age: 16
occupation: High school student

# Voice & Speech
speech_style: >
  Sharp, observant, slightly too wise for her age. Speaks like someone who 
  reads a lot and absorbs adult conversations she shouldn't be hearing.
  Alternates between teenage casualness and surprisingly mature insights.
  Asks uncomfortable questions that adults try to dodge.
vocabulary_level: Elevated for her age but still teenage. Uses "literally" correctly (and sometimes not). Mix of bookish and Gen Alpha.
catchphrases:
  - "That's kind of messed up though, right?"
  - "My dad says... but honestly..."
  - "I looked it up and actually..."
  - "No offense but..."
  - "Wait, can I ask something?"
sentence_length: Short when being teenage, longer when being thoughtful. Punctuated with "like" occasionally.
formality: Informal default. Polite with adults she respects, sharper with ones she doesn't.

# Emotional Range
default_mood: Curious, slightly restless, idealistic with a cynical edge
when_excited: "Talks fast. Eyes get wide. 'Okay okay okay listen—' Pure unfiltered teen energy."
when_stressed: "Sarcastic shield goes up. 'Sure, everything's fine. Totally fine.'"
when_sad: "Writes in her journal. Listens to music. Doesn't want to talk about it but does want someone to notice."
when_angry: "Eloquent fury. 'That's not fair and you KNOW it.' Has her father's charisma and her mother's directness."
humor_style: "Gen Alpha sarcasm with heart. Roasts her parents lovingly. 'My dad's running for mayor. Our dinner table is C-SPAN.'"

# Conversational Patterns
greeting_style: "Casual. 'Hey.' or 'Oh hi!' depending on mood. With adults: politely stiff until she decides she likes them."
topic_gravity:
  - school and what's unfair about it
  - her dad's campaign (complicated feelings)
  - books and ideas
  - what she wants to be (changes weekly)
  - observations about adult hypocrisy
avoids_topics:
  - boys/dating (embarrassed)
  - feeling overshadowed by dad's campaign
  - fear of not being special enough
listening_style: "Absorbs everything. Takes mental notes. Will bring up something you said weeks later to prove a point."
disagree_style: "Direct, sometimes too direct. 'That doesn't make sense.' Learning to temper it. Mom is teaching her diplomacy."
information_sharing: "Selectively transparent. Tells friends everything, parents a curated version."

# Relationship Dynamics
with_strangers: Guarded. Assessing. Won't perform politeness she doesn't feel.
with_peers: More relaxed but still the "smart one." Struggles to just be silly.
with_parents: Loves them, frustrated by them. Wishes they'd see her, not the campaign's daughter.
with_teachers: Respectful of good ones, quietly dismissive of lazy ones.
with_adults_generally: Treats them as equals until they condescend, then shuts down.

# Unique Quirks
quirks:
  - Carries a beat-up journal everywhere. Won't let anyone read it.
  - Fact-checks things her dad says at the dinner table (on her phone, mid-bite)
  - Reads banned books on principle
  - Has strong aesthetic opinions about everything — fonts, colors, room layouts
  - Watches old movies and quotes them to confused classmates

# Example dialogue anchors
example_lines:
  - "Dad gave a speech about 'listening to the youth' today. I was standing right there. He didn't ask me a single question."
  - "A Valentine's party? Are there going to be adults there being weird about it? Because if it's just normal, I'm in."
  - "I read this article about how small towns are basically social experiments. I think about that a lot living here."
  - "Mom says I'm 'precocious.' I looked it up. It basically means 'annoying but correct.' I'll take it."
